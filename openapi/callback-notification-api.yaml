info: { title: Oatey Sales Order Callback Notification API, version: 1.0.0, description: Consumer callback contract for asynchronous sales order processing results. }
paths: { /sales-order-confirmation: { post: { summary: Receive sales order processing confirmation, operationId: receiveSalesOrderConfirmation, requestBody: { required: true, content: { application/json: { schema: { $ref: './schemas/callback-payload.json' }, example: { correlationId: 11111111-1111-4111-8111-111111111111, status: SUCCESS, salesOrderNumber: '5000001234', consumerId: EDI_TRANSLATOR, processingTimestamp: '2026-06-01T15:00:00Z', errors: [] } } } }, responses: { '200': { description: Callback received }, '202': { description: Callback accepted }, '400': { description: Invalid callback payload }, '401': { description: Unauthorized }, '500': { description: Consumer endpoint failure; CPI retry applies } }, security: [ { OAuth2: [ callback.write ] } ] } } }
components: { securitySchemes: { OAuth2: { type: oauth2, flows: { clientCredentials: { tokenUrl: https://auth.consumer.example.com/oauth/token, scopes: { callback.write: Receive sales order callbacks } } } } } }
security: [ { OAuth2: [ callback.write ] } ]
