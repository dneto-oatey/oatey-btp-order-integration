openapi: 3.0.3
info: { title: Oatey Sales Order Inbound API, version: 1.1.0, description: Inbound POC API for posting SAP Sales Order JSON files through APIM to IFL_SO_INBOUND and the standard SAP Sales Order API. }
servers: [ { url: https://api.oatey.example.com/api/v1 } ]
paths: { /sales-orders: { post: { summary: Submit a SAP Sales Order payload asynchronously, operationId: submitSapSalesOrderAsync, description: Accepts the standard SAP Sales Order API JSON structure validated from the Week 2 K-Cimarron Lumber and Affiliated Dist. baseline payloads. APIM enforces authentication, authorization, rate limiting, analytics, and consumer separation only. IFL_SO_INBOUND validates, enriches, generates correlation ID, publishes to JMS, and returns ACK., parameters: [ { name: X-Correlation-ID, in: header, required: false, schema: { type: string, format: uuid }, description: Optional caller-provided correlation ID. Generated by IFL_SO_INBOUND when absent. }, { name: Idempotency-Key, in: header, required: true, schema: { type: string, minLength: 1 }, description: Authoritative idempotency key. Do not send idempotencyKey in the request body. }, { name: X-Consumer-ID, in: header, required: true, schema: { type: string, minLength: 1 }, description: APIM consumer identifier used for separation, policy analytics, and traceability. } ], requestBody: { required: true, content: { application/json: { schema: { $ref: './schemas/sales-order-request.json' }, examples: { affiliatedDist: { summary: Affiliated Dist. baseline shape, value: { SalesOrderType: ZOR, SalesOrganization: '1201', DistributionChannel: '10', OrganizationDivision: '00', SoldToParty: '0001011417', PurchaseOrderByCustomer: P1297405, CustomerPurchaseOrderType: EDI, CustomerPurchaseOrderDate: '2025-04-16T00:00:00', SalesOrderDate: '2025-04-16T00:00:00', PricingDate: '2025-04-16T00:00:00', RequestedDeliveryDate: '2025-04-18T00:00:00', IncotermsClassification: PPD, to_Item: { results: [ { UnderlyingPurchaseOrderItem: '1', Material: '31135', MaterialByCustomer: '35420', PricingDate: '2025-04-16T00:00:00', RequestedQuantity: '6', RequestedQuantityUnit: EA, ZZ1_OriginalOrderQuant_SDI: '6', ZZ1_OriginalOrderQuant_SDIU: EA, to_PricingElement: { results: [ { ConditionType: EDI1, ConditionQuantity: '10', ConditionRateValue: '634', ConditionCurrency: USD } ] } } ] }, to_Text: { results: [ { LongTextID: Z015, LongText: Purchase Order Note TEXT FFA REFERENCE OUR PO# ON ALL DOCUMENTS. } ] } } } } } } }, responses: { '202': { description: Accepted for asynchronous processing and queued for orchestration }, '400': { description: Validation failure }, '401': { description: Unauthorized }, '403': { description: Forbidden }, '422': { description: Schema violation }, '429': { description: Too Many Requests }, '500': { description: System error with correlation ID } } } } }
components: { securitySchemes: { OAuth2: { type: oauth2, flows: { clientCredentials: { tokenUrl: https://auth.oatey.example.com/oauth/token, scopes: { salesorder.write: Submit SAP sales orders } } } } } }
security: [ { OAuth2: [ salesorder.write ] } ]
