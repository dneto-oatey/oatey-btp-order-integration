openapi: 3.0.3
info: { title: Oatey Sales Order Inbound API, version: 1.0.0, description: Asynchronous inbound API routed by APIM to IFL_SO_INBOUND. }
servers: [ { url: https://api.oatey.example.com/api/v1 } ]
paths: { /sales-orders: { post: { summary: Submit an asynchronous sales order, operationId: submitSalesOrderAsync, parameters: [ { name: X-Correlation-ID, in: header, required: false, schema: { type: string, format: uuid } }, { name: Idempotency-Key, in: header, required: true, schema: { type: string } }, { name: X-Consumer-ID, in: header, required: true, schema: { type: string } } ], requestBody: { required: true, content: { application/json: { schema: { $ref: './schemas/sales-order-request.json' } } } }, responses: { '202': { description: Accepted for asynchronous processing }, '400': { description: Validation failure }, '401': { description: Unauthorized }, '403': { description: Forbidden }, '422': { description: Schema violation }, '429': { description: Too Many Requests }, '500': { description: System error with correlation ID } } } } }
components: { securitySchemes: { OAuth2: { type: oauth2, flows: { clientCredentials: { tokenUrl: https://auth.oatey.example.com/oauth/token, scopes: { salesorder.write: Submit sales orders } } } } } }
security: [ { OAuth2: [ salesorder.write ] } ]
