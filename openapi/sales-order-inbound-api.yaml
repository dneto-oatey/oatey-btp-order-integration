openapi: 3.0.3
info:
  title: Oatey Sales Order Inbound API
  version: 1.0.0
  description: Asynchronous inbound sales order API for EDI translators and partner consumers.
servers:
  - url: https://api.oatey.example.com/api/v1
paths:
  /sales-orders:
    post:
      summary: Submit an asynchronous sales order
      operationId: submitSalesOrderAsync
      parameters:
        - name: X-Correlation-ID
          in: header
          required: false
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - name: X-Consumer-ID
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/sales-order-request.json'
      responses:
        '202':
          description: Accepted for asynchronous processing
          content:
            application/json:
              schema:
                type: object
                required:
                  - correlationId
                  - status
                properties:
                  correlationId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: ACCEPTED
        '400':
          description: Validation failure
        '422':
          description: Schema violation
        '500':
          description: System error with correlation ID
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://auth.oatey.example.com/oauth/token
          scopes:
            salesorder.write: Submit sales orders
security:
  - OAuth2:
      - salesorder.write
