openapi: 3.0.3
info:
  title: Oatey Sales Rep Portal Sales Order API
  version: 1.0.0
  description: Synchronous sales order API for the Sales Rep Portal direct pass-through pattern.
servers:
  - url: https://api.oatey.example.com/api/v1/portal
paths:
  /sales-orders:
    post:
      summary: Create a sales order synchronously
      operationId: createPortalSalesOrder
      parameters:
        - name: X-Correlation-ID
          in: header
          required: false
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/sales-order-request.json'
      responses:
        '200':
          description: Sales order created or known duplicate returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  correlationId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [SUCCESS, FAILED]
                  salesOrderNumber:
                    type: string
                  errors:
                    type: array
                    items:
                      $ref: './schemas/error-response.json'
        '400':
          description: Validation failure
        '500':
          description: System error with correlation ID
