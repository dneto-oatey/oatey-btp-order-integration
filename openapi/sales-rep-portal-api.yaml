openapi: 3.0.3
info:
  title: Oatey Sales Rep Portal Sales Order API
    version: 1.0.0
      description: Synchronous APIM proxy contract routed directly to the standard SAP Sales Order API.
      servers:
        - url: https://api.oatey.example.com/api/v1/portal
        paths:
          /sales-orders:
              post:
                    summary: Create a sales order synchronously
                          operationId: createPortalSalesOrder
                                requestBody:
                                        required: true
                                                content:
                                                          application/json:
                                                                      schema:
                                                                                    $ref: './schemas/sales-order-request.json'
                                                                                          responses:
                                                                                                  '200':
                                                                                                            description: Immediate SAP Sales Order API response.
                                                                                                                    '400':
                                                                                                                              description: Validation failure.
                                                                                                                                      '401':
                                                                                                                                                description: Authentication failure.
                                                                                                                                                        '429':
                                                                                                                                                                  description: Rate limit exceeded.
                                                                                                                                                                          '500':
                                                                                                                                                                                    description: Technical failure.
                                                                                                                                                                                    
